[project]
name = "ty-extensions"
version = "0.1.1"
description = "Polyfill for ty_extensions (a module built into the ty type checker)."
requires-python = ">=3.11"
authors = [
    { name = "Joshua V. Dillon" },
]
license = "Apache-2.0"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ty_extensions"]
