name: Package validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Lint, type-check, test, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Validate package
        run: |
          uv sync --all-groups
          uv run ruff check --no-fix --no-cache .
          uv run ruff format --check --no-cache .
          uv run codespell .
          uv run ty check
          uv run basedpyright configgle tests
          uv run pytest
          uv run pytest -m ci_smoke -o addopts="--durations=20" || \
            test "$?" = 5
          uv run python -c "import configgle"
          rm -rf dist
          uv build --out-dir dist
          wheel="$(ls dist/configgle-*.whl | head -n 1)"
          uv run --isolated --with "$wheel" python -c "import configgle; print(configgle.__file__)"
