# See:
#   https://pre-commit.com
#   https://pre-commit.com/hooks.html
#   https://learn.scientific-python.org/development/guides/style/
# uv run pre-commit install
# uv run pre-commit autoupdate
# uv run pre-commit run --all-files
#
# May need: git config --unset-all core.hooksPath
# if: [ERROR] Cowardly refusing to install hooks with `core.hooksPath` set.

# Philosophy: Only fail if there's things which cannot be auto-fixed.
# Hooks fix files in place; if anything changes, pre-commit reports
# "files were modified" and the commit is aborted. Run `git add -u`
# then re-commit -- the second attempt always passes.
fail_fast: false
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:

      - id: end-of-file-fixer
        stages: [pre-commit]

      - id: trailing-whitespace
        stages: [pre-commit]

      - id: check-added-large-files
        stages: [pre-commit]
        args: [--maxkb=500]
        exclude: |
          (?x)^(
            uv\.lock
          )

      - id: check-merge-conflict
        stages: [pre-commit]

      - id: check-yaml
        stages: [pre-commit]

      - id: check-toml
        stages: [pre-commit]

  # Validates uv.lock matches pyproject.toml (no network needed).
  # Run `uv lock` manually when changing dependencies.
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.22
    hooks:
      - id: uv-lock
        stages: [pre-commit]
        files: pyproject.toml
        args: [--locked]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      # Exclusions defined in pyproject.toml.
      - id: ruff-check
        stages: [pre-commit]
        types_or: [python, pyi, jupyter]
        args: [--fix]
      - id: ruff-format
        stages: [pre-commit]
        types_or: [python, pyi, jupyter]

  - repo: local
    hooks:

      - id: codespell
        name: codespell
        language: system
        stages: [pre-commit]
        types_or: [python, markdown, jupyter, shell]
        entry: uv --quiet run --frozen --group lint codespell
        args: [-w]

  # No official ty pre-commit hook yet (https://github.com/astral-sh/ty/issues/269).
  - repo: local
    hooks:
      - id: ty
        name: ty check
        language: system
        stages: [pre-commit]
        # Annoyingly there's no good choice.
        #   pass_filenames: true
        #     Pro: Only what you touch is checked.
        #     Con: pyproject.toml ``[tool.ty.src].exclude`` are ignored.
        #   pass_filenames: false
        #     Pro: pyproject.toml ``[tool.ty.src].exclude`` are ignored.
        #     Con: repo-wide
        # Compromise: duplication; the exclusion list below must mirror
        # pyproject.toml's ``[tool.ty.src]``.
        types_or: [python, pyi]
        entry: uv --quiet run --frozen --group typecheck ty check
        # Exclusions defined in pyproject.toml.

  # To enable:  uv run pre-commit install --hook-type pre-push
  # To disable: uv run pre-commit uninstall --hook-type pre-push
  - repo: local
    hooks:
      - id: ty-global
        name: ty check global
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        entry: uv --quiet run --frozen --group typecheck ty check
        # Exclusions defined in pyproject.toml.

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        language: system
        types: [python]
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        entry: uv --quiet run --frozen --group typecheck basedpyright
        args: [--threads=6]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        language: system
        types: [python]
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        entry: uv --quiet run --frozen --group test pytest
        args: [-q, --tb=short, -n=8]

  # Integration tests are deselected by default (pytest.ini sets
  # `-m "not integration"`), so the hook above skips them.
  # We therefore re-enable them here as part of pre-push gates.
  - repo: local
    hooks:
      - id: pytest-integration
        name: pytest (integration)
        language: system
        types: [python]
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        entry: uv --quiet run --frozen --group test pytest
        args: [-q, --tb=short, -n=8, -m, "integration and not cuda and not performance"]
