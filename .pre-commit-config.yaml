# See:
#   https://pre-commit.com
#   https://pre-commit.com/hooks.html
#   https://learn.scientific-python.org/development/guides/style/
# uv run pre-commit install
# uv run pre-commit autoupdate
# uv run pre-commit run --all-files

fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: end-of-file-fixer
    - id: trailing-whitespace
    - id: check-merge-conflict
    - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      # Run the linter (first).
      - id: ruff-check
        types_or: [python, pyi]
      # Run the formatter (second).
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/DetachHead/basedpyright-pre-commit-mirror
    rev: 1.38.0
    hooks:
      - id: basedpyright

  # No official ty pre-commit hook yet (https://github.com/astral-sh/ty/issues/269).
  # Use a local hook pointing at the venv-installed binary.
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: .venv/bin/ty check .
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/astral-sh/uv-pre-commit
    # https://docs.astral.sh/uv/guides/integration/pre-commit/
    rev: 0.10.4
    hooks:
      - id: uv-lock
        name: uv lock
        files: 'pyproject.toml'
