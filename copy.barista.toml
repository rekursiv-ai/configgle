[workflow]
name = "configgle"
mode = "squash"
source_root = "loop/lib/configgle"

[files]
include = ["**"]
exclude = [
  ".pytest_cache/**",
  "**/.pytest_cache/**",
  ".ruff_cache/**",
  "**/.ruff_cache/**",
  ".venv/**",
  "**/__pycache__/**",
  "**/*.pyc",
  "*.egg-info/**",
  "**/*.egg-info/**",
  "build/**",
  "dist/**",
  "htmlcov/**",
  ".coverage",
]

# The source checkout resolves `ty_extensions` from its parent environment and
# needs this local suppression. The exported package resolves its bundled
# `ty_extensions`, so the suppression becomes unused and public CI treats it as
# a warning.
[[transform]]
type = "replace"
path = "configgle/fig.py"
before = "return cls  # ty: ignore[invalid-return-type]"
after = "return cls"
